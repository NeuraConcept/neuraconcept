name: Release PR (dev → main)

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head dev --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "Release PR #$EXISTING_PR already exists — it will auto-update with new commits."
          else
            gh pr create \
              --base main \
              --head dev \
              --title "release: sync dev to main" \
              --body "$(cat <<'EOF'
          ## Release PR

          Auto-generated PR to sync `dev` → `main`.

          Review changes, approve, and merge when ready to deploy.
          EOF
              )"
            echo "Created new release PR."
          fi
