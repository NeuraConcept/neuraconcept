name: Lighthouse CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Audit Netlify deploy preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Netlify deploy preview
        id: netlify
        uses: jakepartusch/wait-for-netlify-action@f1e137043864b9ab9034ae3a5adc1c108e3f1a48 # v1.4
        with:
          site_name: neuraconcept
          max_timeout: 240

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Collect
        run: |
          BASE="${{ steps.netlify.outputs.url }}"
          BASE="${BASE%/}"
          lhci collect \
            --url="${BASE}/" \
            --url="${BASE}/gradeowl" \
            --url="${BASE}/technology" \
            --url="${BASE}/pricing" \
            --url="${BASE}/waitlist"

      - name: Upload (so scores survive assert failure)
        if: always()
        run: lhci upload --target=temporary-public-storage

      - name: Comment scores on PR
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = '.lighthouseci';
            if (!fs.existsSync(dir)) {
              core.warning('No Lighthouse output found.');
              return;
            }
            const lhrFiles = fs.readdirSync(dir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            if (!lhrFiles.length) {
              core.warning('No lhr-*.json files in .lighthouseci/');
              return;
            }
            // numberOfRuns > 1 produces multiple lhr files per URL; group + take the last (highest-numbered) run per URL.
            const byUrl = new Map();
            for (const f of lhrFiles.sort()) {
              const lhr = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              byUrl.set(lhr.finalUrl, lhr);
            }
            const rows = [...byUrl.values()].map((lhr) => {
              const url = new URL(lhr.finalUrl);
              const route = url.pathname || '/';
              const pct = (k) => Math.round(((lhr.categories[k]?.score) ?? 0) * 100);
              const ms = (k) => {
                const v = lhr.audits[k]?.numericValue;
                return v ? `${(v / 1000).toFixed(1)}s` : '—';
              };
              return `| \`${route}\` | ${pct('performance')} | ${pct('accessibility')} | ${pct('best-practices')} | ${pct('seo')} | ${ms('largest-contentful-paint')} | ${ms('total-blocking-time')} | ${(lhr.audits['cumulative-layout-shift']?.numericValue ?? 0).toFixed(3)} |`;
            });
            const marker = '<!-- lighthouse-ci-comment -->';
            const body = [
              marker,
              '### Lighthouse CI',
              '',
              '| Route | Perf | A11y | BP | SEO | LCP | TBT | CLS |',
              '|---|---:|---:|---:|---:|---:|---:|---:|',
              ...rows,
              '',
              'Hard fails (block PR): color-contrast, image-alt, html-has-lang, meta-description, document-title, CLS > 0.1.',
              'Warn-only (visible, non-blocking): category scores, heading-order, render-blocking, LCP, FCP, TBT, resource budgets.'
            ].join('\n');

            // Find existing comment by marker; update in place to avoid spamming the PR.
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const existing = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const prior = existing.find((c) => (c.body || '').includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Assert
        run: lhci assert
