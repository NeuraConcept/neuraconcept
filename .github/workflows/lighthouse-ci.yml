name: Lighthouse CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Audit Netlify deploy preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Netlify deploy preview
        id: netlify
        uses: jakepartusch/wait-for-netlify-action@f1e137043864b9ab9034ae3a5adc1c108e3f1a48 # v1.4
        with:
          site_name: neuraconcept
          max_timeout: 240

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Collect
        run: |
          lhci collect \
            --url="${{ steps.netlify.outputs.url }}/" \
            --url="${{ steps.netlify.outputs.url }}/gradeowl" \
            --url="${{ steps.netlify.outputs.url }}/technology" \
            --url="${{ steps.netlify.outputs.url }}/pricing" \
            --url="${{ steps.netlify.outputs.url }}/waitlist"

      - name: Upload (so scores survive assert failure)
        if: always()
        run: lhci upload --target=temporary-public-storage

      - name: Comment scores on PR
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = '.lighthouseci';
            if (!fs.existsSync(dir)) {
              core.warning('No Lighthouse output found.');
              return;
            }
            const lhrFiles = fs.readdirSync(dir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            if (!lhrFiles.length) {
              core.warning('No lhr-*.json files in .lighthouseci/');
              return;
            }
            const rows = lhrFiles.map(f => {
              const lhr = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              const url = new URL(lhr.finalUrl);
              const route = url.pathname || '/';
              const pct = (k) => Math.round(((lhr.categories[k]?.score) ?? 0) * 100);
              const ms = (k) => {
                const v = lhr.audits[k]?.numericValue;
                return v ? `${(v / 1000).toFixed(1)}s` : '—';
              };
              return `| \`${route}\` | ${pct('performance')} | ${pct('accessibility')} | ${pct('best-practices')} | ${pct('seo')} | ${ms('largest-contentful-paint')} | ${ms('total-blocking-time')} | ${(lhr.audits['cumulative-layout-shift']?.numericValue ?? 0).toFixed(3)} |`;
            });
            const body = [
              '### Lighthouse CI',
              '',
              '| Route | Perf | A11y | BP | SEO | LCP | TBT | CLS |',
              '|---|---:|---:|---:|---:|---:|---:|---:|',
              ...rows,
              '',
              'Hard fails: color-contrast, image-alt, html-has-lang, meta-description, document-title, a11y >= 0.95, bp >= 0.95, CLS <= 0.1, perf >= 0.85 on `/`/`/pricing`/`/waitlist`.',
              'Warn-only (won\'t block): heading-order, perf on image-heavy pages, SEO, render-blocking, image budgets.'
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Assert
        run: lhci assert
